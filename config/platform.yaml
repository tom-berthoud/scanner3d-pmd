# platform.yaml - Calibration plateforme

steps_per_revolution: 200   # pas moteur pour 360 degres, sans microstepping
microstepping: 16            # facteur de microstepping utilise
degrees_per_step: 0.1125    # = 360 / (steps_per_revolution * microstepping)

# Repere plateforme:
# - origine: centre du plateau a ras de la surface
# - +Z: axe du laser, du laser vers le centre du plateau
# - +X: droite quand on regarde le plateau depuis le laser
# - +Y: hauteur, axe de rotation du plateau
rotation_axis: [0.0, 1.0, 0.0]
rotation_axis_point_mm: [0.0, 0.0, 0.0]
