<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>{% block title %}Scanner 3D{% endblock %}</title>

  <!-- Bootstrap 5 (vendored locally for offline use + low latency on the Pi) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap/bootstrap.min.css') }}" />
  <!-- Bootstrap Icons (vendored) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap-icons/bootstrap-icons.css') }}" />
  <!-- Fonts (vendored) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fonts/fonts.css') }}" />
  <!-- Scanner CSS (cache-busted) -->
  <link rel="stylesheet" href="{{ asset('css/scanner.css') }}" />

  {% block extra_head %}{% endblock %}
</head>
<body{% if engineering %} class="eng-unlocked"{% endif %}>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<!-- ===== Top Navbar (minimal, responsive) ===== -->
<div class="nav-top">
  <a class="brand" href="/">
    <i class="bi bi-broadcast-pin text-success"></i>
    Scanner 3D
  </a>
  {% if engineering %}
  <div class="nav-links">
    <a href="/" {% if request.path == '/' %}class="active"{% endif %}>
      <i class="bi bi-play-circle me-1"></i>Scan
    </a>
    <a href="/calibration" {% if request.path.startswith('/calibration') %}class="active"{% endif %}>
      <i class="bi bi-sliders me-1"></i>Calibration
    </a>
    <a href="/extrinsics" {% if request.path.startswith('/extrinsics') %}class="active"{% endif %}>
      <i class="bi bi-bounding-box me-1"></i>Extrinseque
    </a>
    <a href="/camera-config" {% if request.path.startswith('/camera-config') %}class="active"{% endif %}>
      <i class="bi bi-camera-video me-1"></i>Cam Config
    </a>
    <a href="/manual" {% if request.path.startswith('/manual') %}class="active"{% endif %}>
      <i class="bi bi-tools me-1"></i>Manuel
    </a>
  </div>
  <span class="nav-eng-badge"><i class="bi bi-unlock-fill"></i> ING</span>
  {% endif %}
  <img class="nav-logo" src="{{ asset('img/heig-vd-logo.png') }}" alt="HEIG-VD" />
</div>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<footer class="app-footer text-center py-3">
  Scanner 3D &mdash; HEIG-VD PMD 2026
</footer>

<script src="{{ url_for('static', filename='vendor/bootstrap/bootstrap.bundle.min.js') }}"></script>
<script src="{{ asset('js/scanner.js') }}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
